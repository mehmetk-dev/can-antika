name: Security Contract CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-security-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e-commerce
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile
        run: ./mvnw -DskipTests compile

      - name: Security & Contract Tests
        run: >
          ./mvnw
          "-Dtest=ApiSecurityContractIntegrationTest,ObjectLevelAuthorizationIntegrationTest,RateLimitFilterTest,GlobalExceptionHandlerTest,RestOrderControllerTest,PaymentServiceImplTest,CouponServiceImplTest,AuthServiceTest"
          test

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: can-antika-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: can-antika-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
