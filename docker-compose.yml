services:
  # --- REDIS (Cache & Rate Limit) ---
  redis:
    image: redis:7-alpine
    container_name: can-antika-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- VERİTABANI ---
  db:
    image: postgres:15-alpine
    container_name: can-antika-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-can_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-can_antika_db}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-can_user} -d ${POSTGRES_DB:-can_antika_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FRONTEND (Dev Mode) ---
  frontend:
    image: node:20-alpine
    container_name: can-antika-frontend-app
    working_dir: /app
    volumes:
      - ./can-antika-frontend:/app
    ports:
      - "3005:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8080
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8085}
    command: sh -c "corepack enable && pnpm install && pnpm exec next dev -H 0.0.0.0"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # --- BACKEND ---
  backend:
    build: ./e-commerce
    container_name: can-antika-backend-app
    environment:
      - DB_URL=${DB_URL:-jdbc:postgresql://db:5432/can_antika_db?characterEncoding=UTF-8}
      - DB_USERNAME=${DB_USERNAME:-can_user}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3005,http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD:?APP_ADMIN_PASSWORD is required}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME is required}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY is required}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET is required}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:-http://localhost:3005}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8085}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-disabled}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-disabled}
      - RESEND_API_KEY=${RESEND_API_KEY:-re_placeholder}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - COOKIE_SECURE=false
      - SPRINGDOC_ENABLED=true
      - JPA_DDL_AUTO=update
      - FLYWAY_ENABLED=false
    ports:
      - "8085:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1.5G

volumes:
  postgres_data:
  redis_data:
