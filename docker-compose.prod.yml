services:
  # --- REDIS (Cache & Rate Limit) ---
  redis:
    image: redis:7-alpine
    container_name: can-antika-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- VERİTABANI ---
  db:
    image: postgres:15-alpine
    container_name: can-antika-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-can_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-can_antika_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-can_user} -d ${POSTGRES_DB:-can_antika_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FRONTEND (Production Build) ---
  frontend:
    build: ./can-antika-frontend
    container_name: can-antika-frontend-app
    environment:
      - INTERNAL_API_URL=http://backend:8080
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # --- BACKEND ---
  backend:
    build: ./e-commerce
    container_name: can-antika-backend-app
    environment:
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx1g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError
      - DB_URL=${DB_URL:-jdbc:postgresql://db:5432/can_antika_db?characterEncoding=UTF-8}
      - DB_USERNAME=${DB_USERNAME:-can_user}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD:?APP_ADMIN_PASSWORD is required}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME is required}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY is required}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET is required}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:?APP_FRONTEND_URL is required}
      - APP_BASE_URL=${APP_BASE_URL:?APP_BASE_URL is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - COOKIE_SECURE=true
      - SPRINGDOC_ENABLED=false
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-disabled}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-disabled}
      - RESEND_API_KEY=${RESEND_API_KEY:-re_placeholder}
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1.5G

  # --- NGINX (Reverse Proxy + SSL) ---
  nginx:
    image: nginx:1.25-alpine
    container_name: can-antika-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  # --- CERTBOT (SSL Sertifika Yenileme) ---
  certbot:
    image: certbot/certbot
    container_name: can-antika-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
