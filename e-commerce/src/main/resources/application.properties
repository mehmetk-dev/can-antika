spring.application.name=E-Commerce
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Europe/Istanbul

# ── Logging — correlationId MDC (AUDIT L6) ──
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] %-5level %logger{36} - %msg%n

# PostgreSQL Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/canantika?characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (AUDIT M3)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1500000
spring.datasource.hikari.leak-detection-threshold=30000

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# JPA/Hibernate
# Production'da ddl-auto=validate kullanın. Dev ortamında JPA_DDL_AUTO=update verin.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway (AUDIT L7) ──
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.file.name=logs/app.log
logging.level.root=INFO

# Swagger/OpenAPI — dev'de açmak için SPRINGDOC_ENABLED=true verin (AUDIT C7)
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:false}

# JWT
jwt.secret=${JWT_SECRET:change-this-to-a-very-long-secret-key}
jwt.expirationMs=1800000
jwt.refreshExpirationMs=86400000

# Cookie güvenliği — local dev'de COOKIE_SECURE=false verin (AUDIT M1)
app.cookie.secure=${COOKIE_SECURE:true}

# Redis (Cache)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=${CACHE_TYPE:redis}
spring.cache.redis.time-to-live=600000

# OAuth2 (Google)
# Bu degerleri Google Cloud Console'dan alip buraya eklemelisiniz.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,address,phone
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# File upload - maksimum dosya boyutu
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Resend Email Configuration
resend.api.key=${RESEND_API_KEY:re_placeholder}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# SMTP Email Configuration (Zoho)
spring.mail.host=${SMTP_HOST:smtp.zoho.eu}
spring.mail.port=${SMTP_PORT:465}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.from.email=${SMTP_FROM_EMAIL}
spring.mail.from.name=${SMTP_FROM_NAME:Can Antika}

# Rate limiting (IP başına; sliding window)
# ─── Rate Limit (Merkezi Yönetim) ──────────────────────────────────
# Hiçbir bucket'a uymayan istekler için global limit (IP başına)
rate-limit.global-max-requests=60
rate-limit.global-window-minutes=1

# Bucket tanımları — sıra önemli, ilk eşleşen uygulanır
# Auth: brute force koruması
rate-limit.buckets[0].name=auth
rate-limit.buckets[0].path-prefix=/v1/auth/
rate-limit.buckets[0].max-requests=5
rate-limit.buckets[0].window-minutes=1
rate-limit.buckets[0].message=Çok fazla deneme. Lütfen daha sonra tekrar deneyin.

# Payment: ödeme spam koruması
rate-limit.buckets[1].name=payment
rate-limit.buckets[1].path-prefix=/v1/payment/
rate-limit.buckets[1].max-requests=10
rate-limit.buckets[1].window-minutes=1
rate-limit.buckets[1].message=Ödeme isteği limiti aşıldı. Lütfen kısa süre sonra tekrar deneyin.

# Admin: admin paneli için daha yüksek limit (AUDIT L9)
rate-limit.buckets[2].name=admin
rate-limit.buckets[2].path-prefix=/v1/admin/
rate-limit.buckets[2].max-requests=200
rate-limit.buckets[2].window-minutes=1
rate-limit.buckets[2].message=Admin istek limiti aşıldı. Lütfen biraz bekleyin.

# API genel: tüm /v1/ endpointleri (auth, payment, admin hariç — onlar üstte yakalanır)
rate-limit.buckets[3].name=api
rate-limit.buckets[3].path-prefix=/v1/
rate-limit.buckets[3].max-requests=120
rate-limit.buckets[3].window-minutes=1
rate-limit.buckets[3].message=İstek limiti aşıldı. Lütfen biraz bekleyip tekrar deneyin.

# Base URL - şifre sıfırlama linki için (production'da APP_BASE_URL env ile verin)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Frontend URL - OAuth2 redirect ve CORS için (production'da APP_FRONTEND_URL env ile verin)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3005}

# CORS - production'da frontend domain (virgülle ayırın)
# app.cors.allowed-origins=https://your-frontend.com,https://www.your-frontend.com

# Sipariş otomatik iptal süresi (saat) — PENDING siparişler bu süre sonunda iptal edilir
app.order.expiry-hours=${ORDER_EXPIRY_HOURS:24}

# Admin şifresi (dev ortamı için, production'da APP_ADMIN_PASSWORD env ile verin)
app.admin.password=${APP_ADMIN_PASSWORD:change-me}

# Stok alarm eşiği — bu sayının altına düşen ürünler için admin'e bildirim gider
app.stock.alert-threshold=${STOCK_ALERT_THRESHOLD:5}

# Admin kullanıcı ID — bildirimler bu kullanıcıya gider
app.admin.user-id=${ADMIN_USER_ID:1}

# ── Cloudinary ──────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:change-me}
cloudinary.api-key=${CLOUDINARY_API_KEY:change-me}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:change-me}

# ── Actuator (AUDIT L8) ──
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Thymeleaf (email-only, no MVC view resolution) ──
spring.thymeleaf.check-template-location=false
spring.thymeleaf.enabled=false
