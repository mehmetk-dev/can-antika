spring.application.name=E-Commerce
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Europe/Istanbul
server.max-http-request-header-size=64KB

# ── Logging (Günlük Kaydı) — correlationId MDC (DENETİM L6) ──
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] %-5level %logger{36} - %msg%n

# PostgreSQL Veritabanı Yapılandırması
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/canantika?characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Bağlantı Havuzu (DENETİM M3)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1500000
spring.datasource.hikari.leak-detection-threshold=30000

# Karakter Kodlama Yapılandırması
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# JPA / Hibernate Yapılandırması
# Üretim (Production) ortamında ddl-auto=validate kullanın. Geliştirme (Dev) ortamında JPA_DDL_AUTO=update yapabilirsiniz.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=always
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway Veritabanı Göçü (DENETİM L7) ──
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.jpa.properties.hibernate.format_sql=true

# Günlük Kaydı (Logging) Dosya Yapılandırması
logging.file.name=logs/app.log
logging.level.root=INFO

# Swagger/OpenAPI — Geliştirme ortamında açmak için SPRINGDOC_ENABLED=true yapın (DENETİM C7)
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:false}

# JWT (Kimlik Doğrulama) Ayarları
jwt.secret=${JWT_SECRET:change-this-to-a-very-long-secret-key}
jwt.expirationMs=1800000
jwt.refreshExpirationMs=86400000

# Çerez Güvenliği — Yerel geliştirmede COOKIE_SECURE=false yapın (DENETİM M1)
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# CSRF koruması — Cross-origin SPA (www → api subdomain) cookie-tabanlı CSRF token okuyamaz.
# SameSite=Lax çerezler zaten cross-site POST saldırılarına karşı koruma sağlar.
app.security.csrf.enabled=${APP_SECURITY_CSRF_ENABLED:false}

# JWT token'ları response body'de gösterme (test/legacy istemciler için açılabilir)
app.auth.include-tokens-in-response=${APP_AUTH_INCLUDE_TOKENS_IN_RESPONSE:false}

# Redis (Önbellek) Yapılandırması
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s
spring.cache.type=${CACHE_TYPE:redis}
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=canantika:
spring.cache.redis.time-to-live=600000

# OAuth2 (Google Giriş)
# Bu değerleri Google Cloud Console'dan alıp buraya eklemelisiniz.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,address,phone
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Dosya Yükleme — Maksimum dosya boyutu ayarları
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Resend E-posta Servisi Yapılandırması
resend.api.key=${RESEND_API_KEY:re_placeholder}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# SMTP E-posta Yapılandırması (Zoho)
spring.mail.host=${SMTP_HOST:smtp.zoho.eu}
spring.mail.port=465
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.from.email=${SMTP_FROM_EMAIL}
spring.mail.from.name=${SMTP_FROM_NAME:Can Antika}

# İstek Sınırlandırma (Rate Limiting - IP tabanlı; sabit pencere)
# Genel varsayılan (Hiçbir özel kategoriye uymayan istekler için)
rate-limit.global-max-requests=60
rate-limit.global-window-minutes=1
rate-limit.fail-open-on-redis-error=false

# Giriş Koruması (Brute-force): IP + Kullanıcı Anahtarı
rate-limit.buckets[0].name=auth-login
rate-limit.buckets[0].path-prefix=/v1/auth/login
rate-limit.buckets[0].max-requests=5
rate-limit.buckets[0].window-minutes=1
rate-limit.buckets[0].user-scoped=true
rate-limit.buckets[0].message=Çok fazla giriş denemesi. Lütfen daha sonra tekrar deneyin.

# Token Yenileme Koruması: IP + Yenileme Çerezi
rate-limit.buckets[1].name=auth-refresh
rate-limit.buckets[1].path-prefix=/v1/auth/refresh-token
rate-limit.buckets[1].max-requests=20
rate-limit.buckets[1].window-minutes=1
rate-limit.buckets[1].user-scoped=true
rate-limit.buckets[1].message=Çok fazla token yenileme denemesi. Lütfen daha sonra tekrar deneyin.

# İletişim Formu Spam Koruması: IP + E-posta/Telefon
rate-limit.buckets[2].name=contact
rate-limit.buckets[2].path-prefix=/v1/contact
rate-limit.buckets[2].max-requests=6
rate-limit.buckets[2].window-minutes=1
rate-limit.buckets[2].user-scoped=true
rate-limit.buckets[2].message=Çok fazla iletişim denemesi. Lütfen biraz bekleyin.

# Ödeme Noktası Koruması: IP + Kullanıcı Parmak İzi
rate-limit.buckets[3].name=payment
rate-limit.buckets[3].path-prefix=/v1/payment/
rate-limit.buckets[3].max-requests=10
rate-limit.buckets[3].window-minutes=1
rate-limit.buckets[3].user-scoped=true
rate-limit.buckets[3].message=Ödeme isteği limiti aşıldı. Lütfen kısa süre sonra tekrar deneyin.

# Admin Paneli Koruması
rate-limit.buckets[4].name=admin
rate-limit.buckets[4].path-prefix=/v1/admin/
rate-limit.buckets[4].max-requests=200
rate-limit.buckets[4].window-minutes=1
rate-limit.buckets[4].message=Admin istek limiti aşıldı. Lütfen biraz bekleyin.

# Genel API Koruması
rate-limit.buckets[5].name=api
rate-limit.buckets[5].path-prefix=/v1/
rate-limit.buckets[5].max-requests=120
rate-limit.buckets[5].window-minutes=1
rate-limit.buckets[5].message=İstek limiti aşıldı. Lütfen biraz bekleyip tekrar deneyin.

# Temel URL — Şifre sıfırlama linkleri için (Üretimde APP_BASE_URL env ile verin)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Frontend URL — OAuth2 yönlendirme ve CORS için (Üretimde APP_FRONTEND_URL env ile verin)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3005}

# CORS — Üretim ortamında frontend alan adlarını buraya ekleyin (virgülle ayırın)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3005,http://127.0.0.1:3005}

# Sipariş otomatik iptal süresi (saat) — 'BEKLEMEDE' siparişler bu süre sonunda iptal edilir
app.order.expiry-hours=${ORDER_EXPIRY_HOURS:24}

# Yönetici Şifresi (Geliştirme için; üretimde APP_ADMIN_PASSWORD env ile verin)
app.admin.password=${APP_ADMIN_PASSWORD:change-me}

# Stok alarm eşiği — bu sayının altına düşen ürünler için yöneticiye bildirim gider
app.stock.alert-threshold=${STOCK_ALERT_THRESHOLD:5}

# Yönetici Kullanıcı ID'si — bildirimlerin gideceği hesap
app.admin.user-id=${ADMIN_USER_ID:1}

# ── Cloudinary Görsel Servisi Yapılandırması ──
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:change-me}
cloudinary.api-key=${CLOUDINARY_API_KEY:change-me}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:change-me}

# ── Actuator (Sistem İzleme - DENETİM L8) ──
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.health.mail.enabled=false
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ── Thymeleaf (Sadece e-posta şablonları için kullanılır) ──
spring.thymeleaf.check-template-location=false
spring.thymeleaf.enabled=false

# Geliştirme ortamında örnek verileri (seed) yükleme bayrağı
app.seed.dev-data.enabled=${APP_SEED_DEV_DATA_ENABLED:false}

# Üretim ortamında CORS için HTTPS zorunluluğu
app.cors.require-https-on-prod=${APP_CORS_REQUIRE_HTTPS_ON_PROD:true}
