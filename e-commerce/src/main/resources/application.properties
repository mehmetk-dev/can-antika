app.admin.password=${APP_ADMIN_PASSWORD:change-me}

# Stok alarm eГ…ЕёiГ„Еёi Гўв‚¬вЂќ bu sayГ„В±nГ„В±n altГ„В±na dГѓВјГ…Еёen ГѓВјrГѓВјnler iГѓВ§in admin'e bildirim gider
