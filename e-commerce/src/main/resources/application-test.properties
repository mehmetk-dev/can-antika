spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.flyway.enabled=false
spring.cache.type=simple

# Mock Resend for tests
resend.api.key=re_test
resend.from.email=test@resend.dev

# JWT for tests
jwt.secret=9a61563156616461666164616661646166616461666164616661646166616461
jwt.expirationMs=3600000

# Keep tests deterministic without Redis dependency.
rate-limit.fail-open-on-redis-error=true

# Integration tests rely on response body tokens and existing request contracts.
app.auth.include-tokens-in-response=true
app.security.csrf.enabled=false
