<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
</head>

<body style="margin:0;padding:0;background-color:#f5f0eb;font-family:'Georgia',serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f0eb;padding:40px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0"
                    style="background-color:#ffffff;overflow:hidden;box-shadow:0 4px 24px rgba(26,58,42,0.10);">

                    <!-- Top gold accent line -->
                    <tr>
                        <td style="height:4px;background:linear-gradient(90deg,#c9a84c,#d4b76a,#c9a84c);"></td>
                    </tr>

                    <!-- Header -->
                    <tr>
                        <td style="background-color:#1a3a2a;padding:36px 40px;text-align:center;">
                            <!-- Decorative top ornament -->
                            <div style="color:#c9a84c;font-size:14px;letter-spacing:8px;margin-bottom:12px;">✦ ✦ ✦</div>
                            <h1 style="margin:0;color:#c9a84c;font-size:30px;font-weight:600;letter-spacing:2px;font-family:'Georgia',serif;"
                                th:text="${storeName}">Can Antika</h1>
                            <div style="margin:12px auto 0;width:60px;height:1px;background-color:#c9a84c;opacity:0.5;">
                            </div>
                            <p
                                style="margin:10px 0 0;color:#8fac97;font-size:11px;letter-spacing:4px;text-transform:uppercase;">
                                EST. 1989 · İSTANBUL</p>
                        </td>
                    </tr>

                    <!-- Title section with ornamental border -->
                    <tr>
                        <td style="padding:32px 40px 8px;text-align:center;">
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="text-align:center;">
                                        <div style="display:inline-block;padding:0 24px;">
                                            <h2 style="margin:0;color:#1a3a2a;font-size:22px;font-weight:600;font-family:'Georgia',serif;"
                                                th:text="${title}">Başlık</h2>
                                        </div>
                                        <div
                                            style="margin:12px auto 0;width:40px;height:2px;background-color:#c9a84c;border-radius:1px;">
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Body (fragment insert) -->
                    <tr>
                        <td style="padding:8px 40px 32px;">
                            <div th:insert="~{${contentTemplate} :: content}"></div>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color:#1a3a2a;padding:28px 40px;text-align:center;">
                            <p style="margin:0;color:#8fac97;font-size:12px;line-height:1.6;" th:text="${address}">
                                Çukurcuma Caddesi No: 45, Beyoğlu, İstanbul</p>
                            <p style="margin:4px 0 0;color:#8fac97;font-size:12px;"><span th:text="${phone}">+90 (212)
                                    555-0123</span> · <span th:text="${contactEmail}">info@canantika.com</span></p>
                            <div style="margin:16px auto;width:40px;height:1px;background-color:#c9a84c;opacity:0.4;">
                            </div>
                            <p style="margin:0;color:#c9a84c;font-size:11px;font-style:italic;letter-spacing:1px;">
                                "Geçmişin izinde, geleceğe miras"</p>
                        </td>
                    </tr>

                    <!-- Bottom gold accent line -->
                    <tr>
                        <td style="height:4px;background:linear-gradient(90deg,#c9a84c,#d4b76a,#c9a84c);"></td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
